<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AWS Deployed Website</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        text-align: center;
    }

    header {
        padding: 60px 20px;
    }

    header h1 {
        font-size: 3rem;
        margin-bottom: 10px;
    }

    header p {
        font-size: 1.2rem;
        opacity: 0.9;
    }

    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 25px;
        font-size: 1rem;
        background: white;
        color: #2a5298;
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        background: #f1f1f1;
    }

    section {
        background: white;
        color: #333;
        padding: 50px 20px;
    }

    .card-container {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 30px;
    }

    .card {
        background: #f4f4f4;
        padding: 20px;
        border-radius: 10px;
        width: 250px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    footer {
        padding: 20px;
        font-size: 0.9rem;
        opacity: 0.8;
    }
</style>
</head>
<body>

<header>
    <h1>🚀 Successfully Deployed on AWS EC2</h1>
    <p>Your frontend is now live on the cloud!</p>
    <a href="#" class="btn">Learn More</a>
</header>

<section>
    <h2>About This Deployment</h2>
    <div class="card-container">
        <div class="card">
            <h3>EC2</h3>
            <p>Hosting this website using Amazon EC2.</p>
        </div>
        <div class="card">
            <h3>Apache</h3>
            <p>Web server configured and running.</p>
        </div>
        <div class="card">
            <h3>Security</h3>
            <p>Configured using AWS Security Groups.</p>
        </div>
    </div>
</section>

<footer>
    © 2026 My AWS Practice Project | Built with ❤️
</footer>

</body>
</html>
